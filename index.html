<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Flow | Your Always-Visible Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --accent-color: #7A5AF8;
            --accent-light: #E6E6FA;
            --muted: #666;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            line-height: 1.6;
            cursor: default;
        }

        /* 🌊 Animated Background Particles */
        .particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* 🎨 Gradient Background Blobs */
        .gradient-blob {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            z-index: -1;
            animation: blobMove 20s infinite alternate;
        }

        .blob-1 {
            background: radial-gradient(circle, rgba(122, 90, 248, 0.4) 0%, transparent 70%);
            top: -200px;
            left: -200px;
        }

        .blob-2 {
            background: radial-gradient(circle, rgba(0, 122, 255, 0.3) 0%, transparent 70%);
            bottom: -200px;
            right: -200px;
            animation-delay: -10s;
        }

        .blob-3 {
            background: radial-gradient(circle, rgba(255, 0, 122, 0.2) 0%, transparent 70%);
            top: 50%;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes blobMove {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 50px) scale(1.1); }
            100% { transform: translate(-30px, -30px) scale(0.9); }
        }

        /* 🎯 Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            position: relative;
        }

        .hero-content {
            text-align: center;
            max-width: 900px;
            z-index: 10;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -3px;
            line-height: 0.9;
            animation: fadeInUp 0.8s ease-out;
        }

        .subtitle {
            font-size: 1.4rem;
            font-weight: 300;
            color: #aaa;
            margin-bottom: 3rem;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        /* 🏝️ Dynamic Island Preview */
        .island-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 200px;
            margin: 3rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .dynamic-island {
            position: relative;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            box-shadow: 0 20px 60px rgba(122, 90, 248, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dynamic-island.active {
            width: 100%;
            min-height: 180px;
            flex-direction: column;
            align-items: flex-start;
            padding: 1.25rem;
            justify-content: space-between;
        }

        .island-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-color), #9D7AFF);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
            position: relative;
        }

        .island-icon::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-color), #9D7AFF);
            opacity: 0.5;
            filter: blur(8px);
            z-index: -1;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.3; }
        }

        .island-content {
            flex: 1;
            min-width: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .island-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
            line-height: 1.2;
        }

        .island-subtitle {
            font-size: 0.75rem;
            color: #aaa;
            line-height: 1.3;
        }

        .island-progress {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 0.75rem;
            margin-bottom: 0.5rem;
            overflow: hidden;
            flex-shrink: 0;
        }

        .island-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-color), #9D7AFF);
            border-radius: 2px;
            width: 65%;
            transition: width 0.3s ease;
        }

        .island-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
            width: 100%;
            padding-top: 0.5rem;
        }

        .island-btn {
            flex: 1;
            padding: 0.5rem 0.6rem;
            border-radius: 14px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            min-width: 0;
            white-space: nowrap;
            line-height: 1.2;
        }

        .island-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .island-btn.primary {
            background: linear-gradient(135deg, var(--accent-color), #9D7AFF);
        }

        /* 🎨 Theme Selector */
        .theme-selector {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            margin: 3rem 0;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .theme-pill {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            font-weight: 500;
        }

        .theme-pill:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .theme-pill.active {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-color);
            color: white;
            box-shadow: 0 4px 20px rgba(122, 90, 248, 0.3);
            transform: translateY(-2px) scale(1.05);
        }

        .theme-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: currentColor;
        }

        /* 🔍 Search & Filters */
        .controls {
            max-width: 1200px;
            margin: 4rem auto 2rem;
            padding: 0 2rem;
        }

        .search-box {
            width: 100%;
            max-width: 500px;
            margin: 0 auto 2rem;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(122, 90, 248, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 1.1rem;
        }

        .filter-pills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .filter-pill {
            padding: 0.5rem 1rem;
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-pill:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .filter-pill.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
        }

        /* 📸 Gallery Grid */
        .gallery-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .style-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 1.5rem;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            will-change: transform;
        }

        .style-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(122, 90, 248, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .style-card:hover::before {
            opacity: 1;
        }

        .style-card:hover {
            transform: translateY(-12px) scale(1.02);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(122, 90, 248, 0.2);
        }

        .style-card.hidden {
            display: none;
        }

        .card-image {
            width: 100%;
            aspect-ratio: 1.2 / 1;
            border-radius: 16px;
            margin-bottom: 1rem;
            background: #000;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .style-card:hover .card-image {
            transform: scale(1.1);
        }

        .card-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .card-description {
            font-size: 0.9rem;
            color: #888;
            line-height: 1.5;
        }

        .card-tags {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .card-tag {
            padding: 0.25rem 0.75rem;
            background: rgba(122, 90, 248, 0.2);
            border: 1px solid rgba(122, 90, 248, 0.3);
            border-radius: 100px;
            font-size: 0.7rem;
            color: var(--accent-light);
        }

        /* 🖼️ Lightbox Modal */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            animation: fadeIn 0.3s;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 900px;
            max-height: 90vh;
            position: relative;
            animation: scaleIn 0.3s;
        }

        .lightbox-image {
            width: 100%;
            height: auto;
            border-radius: 24px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
        }

        .lightbox-close {
            position: absolute;
            top: -3rem;
            right: 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 1.5rem;
            transition: all 0.2s;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 📊 Stats */
        .stats {
            display: flex;
            justify-content: center;
            gap: 4rem;
            margin: 4rem 0;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-color), #9D7AFF);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Space Grotesk', sans-serif;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0.5rem;
        }

        /* 🎯 CTA Buttons */
        .cta-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 100px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-color), #9D7AFF);
            color: white;
            box-shadow: 0 10px 30px rgba(122, 90, 248, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(122, 90, 248, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        /* 📱 Responsive */
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
            .stats {
                gap: 2rem;
            }
            .theme-selector {
                gap: 0.5rem;
            }
            .theme-pill {
                font-size: 0.75rem;
                padding: 0.5rem 1rem;
            }
        }

        /* ♿ Accessibility */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }

        .focus-visible {
            outline: 2px solid var(--accent-color);
            outline-offset: 4px;
        }
    </style>
</head>

    <div class="gradient-blob blob-1"></div>

    <!-- 🎯 Hero Section -->

            <!-- 📊 Stats -->
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value">47+</div>

                </div>
                <div class="stat-item">
                    <div class="stat-value">3+</div>
                    <div class="stat-label">External Realms</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">∞</div>
                    <div class="stat-label">Focus Potential</div>

            <!-- 🎯 CTA Buttons -->
            <div class="cta-buttons">

        </div>
    </section>

    <!-- 🔍 Controls -->
    <section class="controls">

        <div class="filter-pills" id="filterPills">
            <button class="filter-pill active" data-filter="all">All</button>
            <button class="filter-pill" data-filter="organic">Organic</button>
            <button class="filter-pill" data-filter="cosmic">Cosmic</button>

            <button class="filter-pill" data-filter="gamified">Gamified</button>
            <button class="filter-pill" data-filter="minimal">Minimal</button>
        </div>
    </section>

    <!-- 📸 Gallery -->
    <section class="gallery-section">
        <div class="gallery-grid" id="galleryGrid">
            <!-- Cards will be dynamically generated -->

    </section>

    <!-- 🖼️ Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close" id="lightboxClose">×</button>
            <img class="lightbox-image" id="lightboxImage" src="" alt="">

    </div>

            // 💎 Figma-Inspired & New Horizons
            { name: "Glassmorphism", image: "Snapshots/Glassmorphism.png", description: "Frosted Material Logic", tags: ["minimal", "premium"], theme: "glass" },
            { name: "Opaque Bold", image: "Snapshots/Opaque_Bold.png", description: "High-Contrast Clarity", tags: ["bold", "tech"], theme: "brutalism" },
            { name: "Courier Prime", image: "Snapshots/Courier_Prime.png", description: "Delivery-Grade Metrics", tags: ["tech", "minimal"], theme: "cyberpunk" },
            { name: "Pixel Art Hero", image: "Snapshots/Pixel_Art_Hero.png", description: "8-Bit Champion", tags: ["gamified", "bold"], theme: "quest" },
            { name: "Circuit Board", image: "Snapshots/Circuit_Board.png", description: "Electronic Pathways", tags: ["tech", "bold"], theme: "cyberpunk" },
            { name: "Liquid Metal", image: "Snapshots/Liquid_Metal.png", description: "Mercurial Flow", tags: ["tech", "cosmic"], theme: "cyberpunk" },
            { name: "Velvet Night", image: "Snapshots/Velvet_Night.png", description: "Luxurious Darkness", tags: ["minimal", "cosmic"], theme: "ethereal" },
            { name: "Sketchbook", image: "Snapshots/Sketchbook.png", description: "Hand-Drawn Charm", tags: ["organic", "minimal"], theme: "ethereal" },
            { name: "Solar Flare", image: "Snapshots/Solar_Flare.png", description: "Radiant Energy Burst", tags: ["cosmic", "bold"], theme: "brutalism" },
            { name: "Deep Space", image: "Snapshots/Deep_Space.png", description: "Infinite Void", tags: ["cosmic", "minimal"], theme: "ethereal" },
        ];

        // 🎯 State Management
        let currentTheme = 'ethereal';
        let currentFilter = 'all';
        let searchQuery = '';
        let islandState = 'idle';

        // 🏝️ Dynamic Island Theme Configs
        const islandThemes = {
            ethereal: {
                bg: 'rgba(0, 0, 0, 0.9)',
                border: 'rgba(122, 90, 248, 0.3)',
                icon: '🎯',
                shadow: 'rgba(122, 90, 248, 0.3)'
            },
            cyberpunk: {
                bg: 'rgba(0, 0, 0, 0.95)',
                border: 'rgba(6, 182, 212, 0.5)',
                icon: '⚡',
                shadow: 'rgba(6, 182, 212, 0.5)'
            },
            garden: {
                bg: 'rgba(5, 20, 5, 0.95)',
                border: 'rgba(16, 185, 129, 0.4)',
                icon: '🌿',
                shadow: 'rgba(16, 185, 129, 0.3)'
            },
            brutalism: {
                bg: 'rgba(255, 255, 255, 1)',
                border: 'rgba(0, 0, 0, 1)',
                icon: '⚫',
                shadow: 'rgba(0, 0, 0, 0.5)'
            },
            glass: {
                bg: 'rgba(255, 255, 255, 0.1)',
                border: 'rgba(255, 255, 255, 0.2)',
                icon: '💎',
                shadow: 'rgba(96, 165, 250, 0.3)'
            },
            quest: {
                bg: 'rgba(20, 10, 0, 0.95)',
                border: 'rgba(249, 115, 22, 0.5)',
                icon: '🛡️',
                shadow: 'rgba(249, 115, 22, 0.3)'
            }
        };

        // 🎨 Initialize Gallery
        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';

            const filtered = styles.filter(style => {
                const matchesFilter = currentFilter === 'all' || style.tags.includes(currentFilter);
                const matchesSearch = style.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                    style.description.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesFilter && matchesSearch;
            });

            filtered.forEach(style => {
                const card = document.createElement('div');
                card.className = 'style-card';
                card.innerHTML = `
                    <img src="${style.image}" alt="${style.name}" class="card-image" loading="lazy">
                    <h3 class="card-title">${style.name}</h3>
                    <p class="card-description">${style.description}</p>
                    <div class="card-tags">
                        ${style.tags.map(tag => `<span class="card-tag">${tag}</span>`).join('')}
                    </div>
                `;
                card.addEventListener('click', () => openLightbox(style.image, style.name));
                grid.appendChild(card);
            });

            // Animate cards in
            setTimeout(() => {
                const cards = grid.querySelectorAll('.style-card');
                cards.forEach((card, index) => {
                    card.style.opacity = '0';
                    card.style.transform = 'translateY(30px)';
                    setTimeout(() => {
                        card.style.transition = 'all 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
                        card.style.opacity = '1';
                        card.style.transform = 'translateY(0)';
                    }, index * 50);
                });
            }, 10);
        }

        // 🏝️ Update Dynamic Island
        function updateIsland() {
            const island = document.getElementById('dynamicIsland');
            const icon = document.getElementById('islandIcon');
            const progress = document.getElementById('islandProgress');
            const actions = document.getElementById('islandActions');
            const theme = islandThemes[currentTheme];

            island.style.background = theme.bg;
            island.style.borderColor = theme.border;
            island.style.boxShadow = `0 20px 60px ${theme.shadow}`;
            icon.textContent = theme.icon;

            if (islandState === 'active') {
                island.classList.add('active');
                progress.style.display = 'block';
                actions.style.display = 'flex';
            } else {
                island.classList.remove('active');
                progress.style.display = 'none';
                actions.style.display = 'none';
            }
        }

        // 🎨 Theme Selector
        document.querySelectorAll('.theme-pill').forEach(pill => {
            pill.addEventListener('click', () => {
                document.querySelectorAll('.theme-pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                currentTheme = pill.dataset.theme;
                updateIsland();
            });
        });

        // 🔍 Search & Filters
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderGallery();
        });

        document.querySelectorAll('.filter-pill').forEach(pill => {
            pill.addEventListener('click', () => {
                document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                currentFilter = pill.dataset.filter;
                renderGallery();
            });
        });

        // 🏝️ Island State Cycling
        document.getElementById('cycleIsland').addEventListener('click', () => {
            const states = ['idle', 'active'];
            const currentIndex = states.indexOf(islandState);
            islandState = states[(currentIndex + 1) % states.length];
            updateIsland();
        });

        // 🖼️ Lightbox
        function openLightbox(image, name) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImage = document.getElementById('lightboxImage');
            lightboxImage.src = image;
            lightboxImage.alt = name;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        document.getElementById('lightboxClose').addEventListener('click', () => {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        });

        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') {
                document.getElementById('lightbox').classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        // ⌨️ Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('lightbox').classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        // 🌊 Particle System
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 50;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }

            draw() {
                ctx.fillStyle = `rgba(122, 90, 248, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            requestAnimationFrame(animateParticles);
        }

        animateParticles();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // 🎯 Initialize
        updateIsland();
        renderGallery();

        // 🎭 Island Click Interaction
        document.getElementById('dynamicIsland').addEventListener('click', () => {
            islandState = islandState === 'idle' ? 'active' : 'idle';
            updateIsland();
        });
    </script>
